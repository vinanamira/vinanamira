name: WakaTime Stats

on:
  schedule:
    # Update otomatis setiap jam 00:00 UTC (sekitar jam 07:00 WIB)
    - cron: '0 0 * * *'
  # Memungkinkan kamu untuk menjalankan script ini secara manual
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with WakaTime Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          BLOCKS: ⣀⣄⣤⣦⣶⣾⣿
          TIME_RANGE: last_7_days
